<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soundscape</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      background: #050805;
      color: #b8ffb8;
      font-family: "Courier New", monospace;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(120,255,120,0.2);
    }

    h1 {
      margin: 0 0 12px 0;
      font-size: 78px;
      line-height: 0.9;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #9cff9c;
      text-shadow: 0 0 8px rgba(120,255,120,0.35);
    }

    p {
      margin: 0;
      max-width: 760px;
      color: #8cff8c;
      font-size: 13px;
      line-height: 1.5;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .controls button {
      background: transparent;
      color: #8cff8c;
      border: 1px solid #8cff8c;
      padding: 12px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-family: "Courier New", monospace;
      transition: 0.2s;
      box-shadow: 0 0 10px rgba(120,255,120,0.1);
    }

    .controls button:hover {
      background: #8cff8c;
      color: black;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.25fr 0.9fr 1.1fr 0.95fr 1.3fr;
      gap: 14px;
      grid-auto-flow: dense;
    }

    .sound {
      border: 1px solid rgba(120,255,120,0.25);
      background: #081108;
      color: #b8ffb8;
      min-height: 110px;
      padding: 18px;
      cursor: pointer;
      text-align: left;
      transition: transform 0.2s, background 0.2s, border 0.2s, opacity 0.2s, box-shadow 0.2s;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(120,255,120,0.05), 0 0 18px rgba(0,255,120,0.05);
    }

    .sound::before {
      content: '';
      position: absolute;
      left: -120%;
      top: 0;
      width: 70%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(140,255,140,0.12), transparent);
      transform: skewX(-20deg);
      transition: 0.4s;
      pointer-events: none;
    }

    .sound:hover::before {
      left: 140%;
    }

    .sound:hover {
      background: #0d180d;
      border-color: #8cff8c;
      box-shadow: inset 0 0 0 1px rgba(140,255,140,0.15), 0 0 20px rgba(140,255,140,0.12);
    }

    .sound.on {
      background: #8cff8c;
      color: black;
      box-shadow: 0 0 20px rgba(140,255,140,0.35);
    }

    .sound.muted {
      opacity: 0.28;
      filter: blur(1px);
    }

    .sound.preview {
      box-shadow: 0 0 0 2px rgba(140,255,140,0.4);
    }

    .num {
      font-size: 11px;
      margin-bottom: 10px;
      opacity: 0.7;
      letter-spacing: 2px;
      color: #72d872;
    }

    .name {
      font-size: 22px;
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1;
      word-break: break-word;
    }

    .type {
      margin-top: 8px;
      font-size: 10px;
      opacity: 0.75;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #72d872;
    }

    .w1 { border-radius: 2px; min-height: 170px; grid-row: span 2; }
    .w2 { border-radius: 30px; }
    .w3 { min-height: 140px; grid-column: span 2; }
    .w4 .name { font-size: 30px; }
    .w5 { min-height: 180px; }
    .w7 { border-style: dashed; grid-column: span 2; }
    .w8 { border-width: 2px; min-height: 160px; }
    .w9 { text-align: center; align-items: center; justify-content: center; }
    .w10 { background: #1a1a1a; grid-row: span 2; }
    .w11 { min-height: 90px; }
    .w13 { padding-top: 34px; min-height: 180px; }
    .w14 { justify-content: center; min-height: 200px; }
    .w15 .name { letter-spacing: 4px; }
    .w16 { border-radius: 50px 10px 50px 10px; grid-column: span 2; }
    .w17 { background: #0d0d0d; min-height: 170px; }
    .w18 { border-left: 8px solid #8cff8c; }
    .w19 { border-right: 8px solid #8cff8c; min-height: 180px; }
    .w20 { min-height: 150px; grid-column: span 2; }
    .w21 .num { font-size: 18px; }
    .w22 .name { font-size: 26px; }
    .w23 { box-shadow: inset 0 0 0 1px rgba(120,255,120,0.18); }
    .w24 { border-top: 6px solid #8cff8c; min-height: 170px; }
    .w25 { border-bottom: 6px solid #8cff8c; grid-column: span 2; min-height: 200px; }

    .shake:hover { transform: translateX(-4px) scale(1.02); }
    .spin:hover { transform: skewX(-10deg) scale(1.03); }
    .tall:hover { transform: scaleY(1.08) scaleX(1.02); }
    .wide:hover { transform: scaleX(1.08) scaleY(1.02); }
    .blinker:hover { opacity: 0.55; }
    .jump:hover { transform: translateY(-8px) scale(1.04); }
    .ghost:hover { opacity: 0.4; }
    .borderpop:hover { border-width: 4px; }
    .slant:hover { transform: skewY(-6deg) scale(1.03); }
    .reverse:hover { transform: translateX(6px) scale(1.03); }

    @media (max-width: 1000px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
      }

      h1 {
        font-size: 56px;
      }

      .w3, .w7, .w16, .w20, .w25 {
        grid-column: span 1;
      }
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      h1 {
        font-size: 44px;
      }
    }

    @media (max-width: 480px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .w1, .w10 {
        grid-row: span 1;
      }

      .w3, .w7, .w16, .w20, .w25 {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>
  <div class="top">
    <div>
      <h1>Soundscape</h1>
      <p>RELEASING FRAGMENTS OF SOUND THAT LAYER, SHIFT, AND RECOMBINE. NOTHING IS FIXED OR COMPLETE, IT BEHAVES LIKE AN OPEN SYSTEM, WHERE SMALL INPUTS ACCUMULATE IN AN UNSTABLE, IMMERSIVE, AND CONSTANTLY CHANGING SPACE.</p>
    </div>
    <div class="controls">
      <button id="stopAll">Stop All</button>
      <button id="randomPlay">Random 5</button>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <script>
    var AC = window.AudioContext || window.webkitAudioContext;
    var ctx = null;
    if (AC) {
      ctx = new AC();
    }

    var grid = document.getElementById('grid');
    var stopAll = document.getElementById('stopAll');
    var randomPlay = document.getElementById('randomPlay');

    var data = [
      { n: 'LOW HUM', t: 'BASS LAYER', f: 58 },
      { n: 'ROOM TONE', t: 'AMBIENT LOOP', f: 96 },
      { n: 'SLOW BEAT', t: 'PULSE LOOP', f: 132 },
      { n: 'HIGH SIGNAL', t: 'BRIGHT TONE', f: 690 },
      { n: 'AIR FLOW', t: 'NOISE LAYER', f: 210 },
      { n: 'METAL TAP', t: 'HARD PULSE', f: 275 },
      { n: 'MID WAVE', t: 'MID LOOP', f: 318 },
      { n: 'RING NOTE', t: 'BRIGHT LOOP', f: 520 },
      { n: 'CLICK TRACK', t: 'SMALL PULSE', f: 448 },
      { n: 'STATIC BED', t: 'GRAIN NOISE', f: 180 },
      { n: 'DEEP FLOOR', t: 'LOW DRONE', f: 68 },
      { n: 'SOFT WIND', t: 'AIR LOOP', f: 238 },
      { n: 'THIN LINE', t: 'HIGH TONE', f: 612 },
      { n: 'DROP HIT', t: 'SOFT HIT', f: 226 },
      { n: 'DARK DRONE', t: 'LONG LAYER', f: 88 },
      { n: 'FAST PULSE', t: 'QUICK LOOP', f: 386 },
      { n: 'WARM PAD', t: 'SOFT AMBIENT', f: 172 },
      { n: 'CENTER TONE', t: 'STABLE MID', f: 348 },
      { n: 'SHARP FLASH', t: 'BRIGHT EDGE', f: 742 },
      { n: 'HEAVY BASS', t: 'WEIGHT LOOP', f: 64 },
      { n: 'FADE LINE', t: 'GHOST MID', f: 474 },
      { n: 'HISS NOISE', t: 'SHARP TEXTURE', f: 284 },
      { n: 'NIGHT LOOP', t: 'DARK AMBIENT', f: 118 },
      { n: 'ELECTRIC HUM', t: 'HUM LOOP', f: 206 },
      { n: 'LASER TONE', t: 'LONG HIGH', f: 860 }
    ];

    var stuff = [];
    var previewOsc = null;
    var previewGain = null;

    function quickPreview(f) {
      if (!ctx) return;
      stopPreview();
      previewOsc = ctx.createOscillator();
      previewGain = ctx.createGain();
      previewOsc.type = 'sine';
      previewOsc.frequency.value = f;
      previewGain.gain.value = 0.012;
      previewOsc.connect(previewGain);
      previewGain.connect(ctx.destination);
      previewOsc.start();
    }

    function stopPreview() {
      if (previewOsc) {
        previewOsc.stop();
        previewOsc = null;
        previewGain = null;
      }
    }

    function playSound(one) {
      if (!ctx) return;

      var o1 = ctx.createOscillator();
      var o2 = ctx.createOscillator();
      var g = ctx.createGain();
      var l = ctx.createOscillator();
      var lg = ctx.createGain();
      var f = ctx.createBiquadFilter();
      var group = one.i % 5;

      if (group === 0) {
        o1.type = 'sine';
        o2.type = 'triangle';
        o1.frequency.value = one.item.f;
        o2.frequency.value = one.item.f * 0.5;
        g.gain.value = 0.05;
        l.frequency.value = 0.18;
        lg.gain.value = 4;
        f.type = 'lowpass';
        f.frequency.value = 220;
      }

      if (group === 1) {
        o1.type = 'sawtooth';
        o2.type = 'square';
        o1.frequency.value = one.item.f;
        o2.frequency.value = one.item.f * 1.01;
        g.gain.value = 0.022;
        l.frequency.value = 6 + (one.i % 3);
        lg.gain.value = 18;
        f.type = 'bandpass';
        f.frequency.value = 500 + one.i * 10;
      }

      if (group === 2) {
        o1.type = 'square';
        o2.type = 'square';
        o1.frequency.value = one.item.f;
        o2.frequency.value = one.item.f * 2;
        g.gain.value = 0.018;
        l.frequency.value = 2.5;
        lg.gain.value = 40;
        f.type = 'highpass';
        f.frequency.value = 700;
      }

      if (group === 3) {
        o1.type = 'triangle';
        o2.type = 'sine';
        o1.frequency.value = one.item.f;
        o2.frequency.value = one.item.f * 1.5;
        g.gain.value = 0.03;
        l.frequency.value = 0.7;
        lg.gain.value = 10;
        f.type = 'bandpass';
        f.frequency.value = 300 + one.i * 20;
      }

      if (group === 4) {
        o1.type = 'sawtooth';
        o2.type = 'triangle';
        o1.frequency.value = one.item.f;
        o2.frequency.value = one.item.f * 3;
        g.gain.value = 0.012;
        l.frequency.value = 8;
        lg.gain.value = 65;
        f.type = 'highpass';
        f.frequency.value = 1000;
      }

      l.type = 'sine';
      f.Q.value = 1 + (one.i % 6);

      l.connect(lg);
      lg.connect(o1.frequency);
      o1.connect(f);
      o2.connect(f);
      f.connect(g);
      g.connect(ctx.destination);

      o1.start();
      o2.start();
      l.start();

      one.osc1 = o1;
      one.osc2 = o2;
      one.gain = g;
      one.lfo = l;
      one.lfoGain = lg;
      one.filter = f;
      one.on = true;
      one.el.classList.add('on');
    }

    function stopSound(one) {
      if (one.osc1) one.osc1.stop();
      if (one.osc2) one.osc2.stop();
      if (one.lfo) one.lfo.stop();
      one.osc1 = null;
      one.osc2 = null;
      one.gain = null;
      one.lfo = null;
      one.lfoGain = null;
      one.filter = null;
      one.on = false;
      one.el.classList.remove('on');
    }

    function makeOne(item, i) {
      var b = document.createElement('button');
      b.className = 'sound w' + (i + 1);

      if (i % 10 === 0) b.className += ' shake';
      if (i % 10 === 1) b.className += ' spin';
      if (i % 10 === 2) b.className += ' tall';
      if (i % 10 === 3) b.className += ' wide';
      if (i % 10 === 4) b.className += ' blinker';
      if (i % 10 === 5) b.className += ' jump';
      if (i % 10 === 6) b.className += ' ghost';
      if (i % 10 === 7) b.className += ' borderpop';
      if (i % 10 === 8) b.className += ' slant';
      if (i % 10 === 9) b.className += ' reverse';

      b.innerHTML = '<div class="num">' + (i + 1) + '/25</div><div class="name">' + item.n + '</div><div class="type">' + item.t + '</div>';
      grid.appendChild(b);

      var one = {
        el: b,
        osc1: null,
        osc2: null,
        gain: null,
        lfo: null,
        lfoGain: null,
        filter: null,
        on: false,
        item: item,
        i: i
      };

      b.addEventListener('mouseenter', function() {
        b.classList.add('preview');
        if (!one.on) quickPreview(one.item.f);

        if (one.i % 5 === 0) {
          for (var k = 0; k < stuff.length; k++) {
            if (stuff[k] !== one && !stuff[k].on) {
              stuff[k].el.classList.add('muted');
            }
          }
        }
      });

      b.addEventListener('mouseleave', function() {
        b.classList.remove('preview');
        stopPreview();
        for (var k = 0; k < stuff.length; k++) {
          stuff[k].el.classList.remove('muted');
        }
      });

      b.addEventListener('mousedown', function() {
        b.style.transform = 'scale(0.92)';
      });

      b.addEventListener('mouseup', function() {
        if (!one.on) {
          b.style.transform = '';
        }
      });

      b.addEventListener('click', function() {
        if (ctx && ctx.state === 'suspended') {
          ctx.resume();
        }

        if (one.on) {
          stopSound(one);
        } else {
          playSound(one);
        }
      });

      stuff.push(one);
    }

    stopAll.addEventListener('click', function() {
      for (var i = 0; i < stuff.length; i++) {
        if (stuff[i].on) stopSound(stuff[i]);
      }
    });

    randomPlay.addEventListener('click', function() {
      for (var i = 0; i < stuff.length; i++) {
        if (stuff[i].on) stopSound(stuff[i]);
      }

      var arr = [];
      while (arr.length < 5) {
        var r = Math.floor(Math.random() * stuff.length);
        if (arr.indexOf(r) === -1) arr.push(r);
      }

      for (var j = 0; j < arr.length; j++) {
        playSound(stuff[arr[j]]);
      }
    });

    for (var i = 0; i < data.length; i++) {
      makeOne(data[i], i);
    }
  </script>
</body>
</html>
