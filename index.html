<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Sound Lab</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: white;
      min-height: 100vh;
      padding: 30px;
      box-sizing: border-box;
    }

    h1 {
      font-size: 48px;
      margin: 0 0 10px 0;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    p {
      margin: 0 0 30px 0;
      color: #bdbdbd;
      max-width: 700px;
      line-height: 1.5;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .controls button {
      background: white;
      color: black;
      border: none;
      padding: 12px 18px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 999px;
    }

    .controls button:hover {
      transform: scale(1.05);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
    }

    .sound {
      border: 1px solid #2f2f2f;
      background: #161616;
      color: white;
      min-height: 110px;
      padding: 18px;
      cursor: pointer;
      text-align: left;
      transition: 0.2s;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .sound::before {
      content: '';
      position: absolute;
      left: -120%;
      top: 0;
      width: 70%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.16), transparent);
      transform: skewX(-20deg);
      transition: 0.4s;
      pointer-events: none;
    }

    .sound:hover::before {
      left: 140%;
    }

    .sound:hover {
      transform: translateY(-6px) scale(1.02);
      border-color: white;
      background: #222;
    }

    .sound.on {
      background: white;
      color: black;
      transform: scale(0.96) rotate(1deg);
      box-shadow: 0 0 20px rgba(255,255,255,0.4);
    }

    .sound .num {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 10px;
    }

    .sound .name {
      font-size: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .sound .type {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 8px;
    }

    .sound.w1 { border-radius: 2px; }
    .sound.w2 { border-radius: 30px; }
    .sound.w3 { min-height: 140px; }
    .sound.w4 .name { font-size: 28px; }
    .sound.w5 { transform: rotate(-1deg); }
    .sound.w6 { transform: rotate(1deg); }
    .sound.w7 { border-style: dashed; }
    .sound.w8 { border-width: 2px; }
    .sound.w9 { text-align: center; align-items: center; }
    .sound.w10 { background: #1e1e1e; }
    .sound.w11 { min-height: 90px; }
    .sound.w12 .type { text-transform: uppercase; }
    .sound.w13 { padding-top: 30px; }
    .sound.w14 { justify-content: center; }
    .sound.w15 .name { letter-spacing: 4px; }
    .sound.w16 { border-radius: 50px 10px 50px 10px; }
    .sound.w17 { background: #111; }
    .sound.w18 { border-left: 8px solid white; }
    .sound.w19 { border-right: 8px solid white; }
    .sound.w20 { min-height: 130px; }
    .sound.w21 .num { font-size: 18px; }
    .sound.w22 .name { font-style: italic; }
    .sound.w23 { box-shadow: inset 0 0 0 1px #444; }
    .sound.w24 { border-top: 6px solid white; }
    .sound.w25 { border-bottom: 6px solid white; }

    .sound.shake:hover { animation: shaky 0.18s infinite; }
    .sound.spin:hover { animation: spinny 0.7s linear infinite; }
    .sound.tall:hover { transform: scaleY(1.08) scaleX(1.02); }
    .sound.wide:hover { transform: scaleX(1.08) scaleY(1.02); }
    .sound.blinker:hover { animation: blinky 0.5s infinite; }
    .sound.jump:hover { animation: jumpy 0.35s infinite alternate; }
    .sound.ghost:hover { opacity: 0.55; }
    .sound.borderpop:hover { border-width: 4px; }
    .sound.slant:hover { transform: rotate(-4deg) scale(1.03); }
    .sound.reverse:hover { transform: rotate(4deg) scale(1.03); }

    .sound.on .type,
    .sound.on .num {
      opacity: 1;
    }

    .sound.muted {
      opacity: 0.28;
      filter: blur(1px);
    }

    .sound.preview {
      box-shadow: 0 0 0 2px rgba(255,255,255,0.5);
    }

    @keyframes shaky {
      0% { transform: translateX(0px) rotate(0deg); }
      25% { transform: translateX(-2px) rotate(-1deg); }
      50% { transform: translateX(2px) rotate(1deg); }
      75% { transform: translateX(-1px) rotate(-1deg); }
      100% { transform: translateX(1px) rotate(1deg); }
    }

    @keyframes spinny {
      from { transform: rotate(0deg) scale(1.03); }
      to { transform: rotate(360deg) scale(1.03); }
    }

    @keyframes blinky {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    @keyframes jumpy {
      from { transform: translateY(0px) scale(1.02); }
      to { transform: translateY(-8px) scale(1.04); }
    }

    @keyframes floaty {
      from { transform: scale(0.96) rotate(-1deg) translateY(0px); }
      to { transform: scale(0.98) rotate(1deg) translateY(-4px); }
    }

    @media (max-width: 1000px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      h1 {
        font-size: 34px;
      }
    }

    @media (max-width: 480px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="top">
    <div>
      <h1>Button Sound Lab</h1>
      <p>25 buttons. 25 loops. Click different buttons to stack sounds and build your own rough experimental music piece. Click again to stop a sound.</p>
    </div>

    <div class="controls">
      <button id="stopAll">Stop All</button>
      <button id="randomPlay">Random 5</button>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="info">
    
  </div>

  <script>
    var AudioThing = window.AudioContext || window.webkitAudioContext;
    var ctx = new AudioThing();
    var grid = document.getElementById('grid');
    var stopAll = document.getElementById('stopAll');
    var randomPlay = document.getElementById('randomPlay');

    var data = [
      { n: 'drone', t: 'low tone', f: 80 },
      { n: 'hum', t: 'soft layer', f: 110 },
      { n: 'pulse', t: 'slow beat', f: 140 },
      { n: 'glass', t: 'high tone', f: 660 },
      { n: 'air', t: 'breath noise', f: 220 },
      { n: 'metal', t: 'hard pulse', f: 260 },
      { n: 'echo', t: 'mid tone', f: 300 },
      { n: 'ring', t: 'bright tone', f: 520 },
      { n: 'tick', t: 'small beat', f: 440 },
      { n: 'static', t: 'noise', f: 170 },
      { n: 'bass', t: 'deep loop', f: 70 },
      { n: 'wind', t: 'moving air', f: 250 },
      { n: 'wire', t: 'thin line', f: 590 },
      { n: 'drop', t: 'soft hit', f: 230 },
      { n: 'void', t: 'long drone', f: 95 },
      { n: 'blink', t: 'quick pulse', f: 390 },
      { n: 'wave', t: 'warm tone', f: 175 },
      { n: 'tone', t: 'plain sound', f: 350 },
      { n: 'spark', t: 'short flash', f: 720 },
      { n: 'floor', t: 'heavy base', f: 65 },
      { n: 'trace', t: 'faded tone', f: 480 },
      { n: 'hiss', t: 'sharp air', f: 280 },
      { n: 'night', t: 'dark loop', f: 120 },
      { n: 'coil', t: 'electric hum', f: 210 },
      { n: 'beam', t: 'long high', f: 840 }
    ];

    var stuff = [];
    var previewOsc = null;
    var previewGain = null;

    function makeOne(item, i) {
      var b = document.createElement('button');
      b.className = 'sound w' + (i + 1);

      if (i % 10 === 0) b.className += ' shake';
      if (i % 10 === 1) b.className += ' spin';
      if (i % 10 === 2) b.className += ' tall';
      if (i % 10 === 3) b.className += ' wide';
      if (i % 10 === 4) b.className += ' blinker';
      if (i % 10 === 5) b.className += ' jump';
      if (i % 10 === 6) b.className += ' ghost';
      if (i % 10 === 7) b.className += ' borderpop';
      if (i % 10 === 8) b.className += ' slant';
      if (i % 10 === 9) b.className += ' reverse';

      b.innerHTML = '<div class="num">' + (i + 1) + '/25</div><div class="name">' + item.n + '</div><div class="type">' + item.t + '</div>';
      grid.appendChild(b);

      var one = {
        el: b,
        osc1: null,
        osc2: null,
        gain: null,
        lfo: null,
        lfoGain: null,
        noise: null,
        filter: null,
        on: false,
        item: item,
        i: i
      };

      b.addEventListener('mouseenter', function() {
        b.classList.add('preview');

        if (!one.on) {
          quickPreview(one.item.f);
        }

        if (one.i % 5 === 0) {
          for (var k = 0; k < stuff.length; k++) {
            if (stuff[k] !== one && !stuff[k].on) {
              stuff[k].el.classList.add('muted');
            }
          }
        }
      });

      b.addEventListener('mouseleave', function() {
        b.classList.remove('preview');
        stopPreview();

        for (var k = 0; k < stuff.length; k++) {
          stuff[k].el.classList.remove('muted');
        }
      });

      b.addEventListener('mousedown', function() {
        b.style.transform = 'scale(0.92)';
      });

      b.addEventListener('mouseup', function() {
        if (!one.on) {
          b.style.transform = '';
        }
      });

      b.addEventListener('dblclick', function(e) {
        e.preventDefault();
        crazyToggle(one);
      });

      b.addEventListener('click', function() {
        if (ctx.state === 'suspended') {
          ctx.resume();
        }

        if (one.on) {
          stopSound(one);
        } else {
          playSound(one);
        }
      });

      stuff.push(one);
    }
    }

    function quickPreview(f) {
      stopPreview();
      previewOsc = ctx.createOscillator();
      previewGain = ctx.createGain();
      previewOsc.type = 'sine';
      previewOsc.frequency.value = f;
      previewGain.gain.value = 0.012;
      previewOsc.connect(previewGain);
      previewGain.connect(ctx.destination);
      previewOsc.start();
    }

    function stopPreview() {
      if (previewOsc) {
        previewOsc.stop();
        previewOsc = null;
        previewGain = null;
      }
    }

    function crazyToggle(one) {
      if (one.el.classList.contains('reverse')) {
        one.el.classList.remove('reverse');
        one.el.classList.add('shake');
      } else if (one.el.classList.contains('shake')) {
        one.el.classList.remove('shake');
        one.el.classList.add('spin');
      } else if (one.el.classList.contains('spin')) {
        one.el.classList.remove('spin');
        one.el.classList.add('jump');
      } else {
        one.el.classList.add('reverse');
      }
    }

    function playSound(one) {
      var o1 = ctx.createOscillator();
      var o2 = ctx.createOscillator();
      var g = ctx.createGain();
      var l = ctx.createOscillator();
      var lg = ctx.createGain();
      var f = ctx.createBiquadFilter();

      o1.type = ['sine', 'square', 'triangle', 'sawtooth'][one.i % 4];
      o2.type = ['triangle', 'sine', 'sawtooth', 'square'][one.i % 4];

      o1.frequency.value = one.item.f;
      o2.frequency.value = one.item.f * 1.5;

      g.gain.value = 0.03 + (one.i % 5) * 0.01;

      l.type = 'sine';
      l.frequency.value = 0.2 + (one.i % 6) * 0.15;
      lg.gain.value = 5 + (one.i % 4) * 8;

      f.type = ['lowpass', 'bandpass', 'highpass'][one.i % 3];
      f.frequency.value = 200 + one.i * 35;
      f.Q.value = 1 + (one.i % 5);

      l.connect(lg);
      lg.connect(o1.frequency);

      o1.connect(f);
      o2.connect(f);
      f.connect(g);
      g.connect(ctx.destination);

      o1.start();
      o2.start();
      l.start();

      one.osc1 = o1;
      one.osc2 = o2;
      one.gain = g;
      one.lfo = l;
      one.lfoGain = lg;
      one.filter = f;
      one.on = true;
      one.el.classList.add('on');
    }

    function stopSound(one) {
      if (one.osc1) one.osc1.stop();
      if (one.osc2) one.osc2.stop();
      if (one.lfo) one.lfo.stop();

      one.osc1 = null;
      one.osc2 = null;
      one.gain = null;
      one.lfo = null;
      one.lfoGain = null;
      one.filter = null;
      one.on = false;
      one.el.classList.remove('on');
    }

    stopAll.addEventListener('click', function() {
      for (var i = 0; i < stuff.length; i++) {
        if (stuff[i].on) {
          stopSound(stuff[i]);
        }
      }
    });

    randomPlay.addEventListener('click', function() {
      for (var i = 0; i < stuff.length; i++) {
        if (stuff[i].on) {
          stopSound(stuff[i]);
        }
      }

      var arr = [];
      while (arr.length < 5) {
        var r = Math.floor(Math.random() * stuff.length);
        if (arr.indexOf(r) === -1) {
          arr.push(r);
        }
      }

      for (var j = 0; j < arr.length; j++) {
        playSound(stuff[arr[j]]);
      }
    });

    for (var i = 0; i < data.length; i++) {
      makeOne(data[i], i);
    }
  </script>
</body>
</html>
